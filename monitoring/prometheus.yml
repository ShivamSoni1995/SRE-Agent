global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Scrape OpenSRE Mini API
  - job_name: opensre-mini
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics

  # Scrape Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
