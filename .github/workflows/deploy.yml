name: CI/CD — OpenSRE Mini

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  API_SERVICE: opensre-mini
  UI_SERVICE: opensre-ui

jobs:

  # ── Job 1: Run tests on every push and PR ─────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run test suite
        run: pytest tests/ -v --tb=short

  # ── Job 2: Deploy API to Cloud Run ────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit API build (async)
        run: |
          BUILD_ID=$(gcloud builds submit \
            --tag gcr.io/$PROJECT_ID/$API_SERVICE \
            --gcs-source-staging-dir=gs://open-sre_cloudbuild/source \
            --async \
            --format="value(id)" \
            .)
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
          echo "Build submitted: $BUILD_ID"
          echo "Logs: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID"

      - name: Wait for API build to complete
        run: |
          echo "Waiting for build $BUILD_ID to complete..."
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID \
              --format="value(status)")
            echo "Status: $STATUS"
            case $STATUS in
              SUCCESS)
                echo "Build succeeded"
                break
                ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR)
                echo "Build failed with status: $STATUS"
                exit 1
                ;;
              *)
                sleep 30
                ;;
            esac
          done

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy $API_SERVICE \
            --image gcr.io/$PROJECT_ID/$API_SERVICE \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --set-secrets GEMINI_API_KEY=GEMINI_API_KEY:latest \
            --set-env-vars USE_FIRESTORE=true \
            --set-env-vars SLACK_SEVERITY_THRESHOLD=warning \
            --set-env-vars SERVICE_URL=${{ secrets.API_SERVICE_URL }} \
            --set-env-vars SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 3

      - name: Print API URL
        run: |
          gcloud run services describe $API_SERVICE \
            --region $REGION \
            --format "value(status.url)"

  # ── Job 3: Deploy UI to Cloud Run ─────────────────────────────────────────
  deploy-ui:
    name: Deploy UI
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit UI build (async)
        run: |
          BUILD_ID=$(gcloud builds submit \
            --config cloudbuild-ui.yaml \
            --gcs-source-staging-dir=gs://open-sre_cloudbuild/source \
            --async \
            --format="value(id)" \
            .)
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
          echo "Build submitted: $BUILD_ID"
          echo "Logs: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID"

      - name: Wait for UI build to complete
        run: |
          echo "Waiting for build $BUILD_ID to complete..."
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID \
              --format="value(status)")
            echo "Status: $STATUS"
            case $STATUS in
              SUCCESS)
                echo "Build succeeded"
                break
                ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR)
                echo "Build failed with status: $STATUS"
                exit 1
                ;;
              *)
                sleep 30
                ;;
            esac
          done

      - name: Deploy UI to Cloud Run
        run: |
          gcloud run deploy $UI_SERVICE \
            --image gcr.io/$PROJECT_ID/$UI_SERVICE \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2

      - name: Print UI URL
        run: |
          gcloud run services describe $UI_SERVICE \
            --region $REGION \
            --format "value(status.url)"
